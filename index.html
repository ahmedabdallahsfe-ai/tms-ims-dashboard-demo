  const cut = p.indexOf("|");
  return {
    month: r[0],
    bu: BUS[r[1]],
    line: LINES[r[2]],
    brand: BRANDS[r[3]],
    code: p.slice(0, cut),
    product: p.slice(cut + 1),
    salesType: STYPES[r[5]],
    type: r[6],
    qty: r[7],
    value: r[8],
  };
});

// Last month with reported IMS (reporting gap detection, volume-based)
const LAST_IMS_MONTH = Math.max(
  ...DATA.filter((d) => d.type === TYPE_IMS && d.qty > 0).map((d) => d.month)
);
const GAP_MONTHS = MONTHS.filter((_, i) => i > LAST_IMS_MONTH);

// Data ends at the last TMS month; stockout projections count from here
const LAST_DATA_MONTH = Math.max(...DATA.map((d) => d.month));
const BASE_YEAR = 2026;
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const projectDate = (mocMonths) => {
  const total = LAST_DATA_MONTH + Math.ceil(mocMonths);
  const y = BASE_YEAR + Math.floor(total / 12);
  return `${MONTH_NAMES[total % 12]} ${y}`;
};

const COLORS = { tms: "#4338ca", ims: "#0d9488" };

// ---------- formatting helpers ----------
const fmtCompact = (n) => {
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (abs >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (abs >= 1e3) return (n / 1e3).toFixed(1) + "K";
  return String(Math.round(n));
};
const fmtFull = (n) => Math.round(n).toLocaleString("en-US");

// selection helper: empty array = "All"
const sel = (arr, v) => arr.length === 0 || arr.includes(v);

// MoC status classification
const mocStatus = (inv, moc) => {
  if (inv < 0) return { label: "Pre-period stock", cls: "bg-violet-100 text-violet-700" };
  if (moc === null) return { label: "No offtake", cls: "bg-slate-200 text-slate-600" };
  if (moc < 1) return { label: "Stockout risk", cls: "bg-red-100 text-red-700" };
  if (moc <= 3) return { label: "Healthy", cls: "bg-emerald-100 text-emerald-700" };
  if (moc <= 6) return { label: "High stock", cls: "bg-amber-100 text-amber-700" };
  return { label: "Overstock", cls: "bg-orange-100 text-orange-700" };
};
const mocCellColor = (moc) => {
  if (moc === null) return "bg-slate-100 text-slate-400";
  if (moc < 0) return "bg-violet-50 text-violet-700";
  if (moc < 1) return "bg-red-100 text-red-800";
  if (moc <= 3) return "bg-emerald-100 text-emerald-800";
  if (moc <= 6) return "bg-amber-100 text-amber-800";
  return "bg-orange-200 text-orange-900";
};

// ============================================================
// Multi-select checkbox dropdown (empty selection = All)
// with search box for long option lists
// ============================================================
function MultiSelect({ label, options, selected, onChange, wide }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const allSelected = selected.length === 0;
  const summary = allSelected
    ? "All"
    : selected.length === 1
    ? selected[0]
    : `${selected.length} selected`;
  const shown = query
    ? options.filter((o) => o.toLowerCase().includes(query.toLowerCase()))
    : options;

  const toggle = (opt) => {
    if (selected.includes(opt)) onChange(selected.filter((o) => o !== opt));
    else {
      const next = [...selected, opt];
      onChange(next.length === options.length ? [] : next);
    }
  };

  return (
    <div className="relative min-w-[140px]">
      <span className="mb-1 block text-[11px] font-semibold uppercase tracking-wide text-slate-500">
        {label}
      </span>
      <button
        type="button"
        onClick={() => { setOpen(!open); setQuery(""); }}
        className={`flex w-full items-center justify-between gap-2 rounded-lg border bg-white px-2.5 py-1.5 text-sm shadow-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 ${
          allSelected
            ? "border-slate-300 text-slate-800"
            : "border-indigo-400 text-indigo-700 font-semibold"
        }`}
      >
        <span className="max-w-[140px] truncate">{summary}</span>
        <span className="flex shrink-0 items-center gap-1.5">
          {!allSelected && (
            <span className="rounded-full bg-indigo-100 px-1.5 text-[10px] font-bold text-indigo-700">
              {selected.length}
            </span>
          )}
          <ChevronDown
            className={`h-4 w-4 text-slate-400 transition-transform ${open ? "rotate-180" : ""}`}
          />
        </span>
      </button>

      {open && (
        <>
          <div className="fixed inset-0 z-10" onClick={() => setOpen(false)} />
          <div className={`absolute z-20 mt-1 rounded-lg border border-slate-200 bg-white p-1.5 shadow-xl ${wide ? "w-80" : "w-56"}`}>
            {options.length > 12 && (
              <div className="mb-1 flex items-center gap-1.5 rounded-md border border-slate-200 bg-slate-50 px-2 py-1">
                <Search className="h-3.5 w-3.5 text-slate-400" />
                <input
                  autoFocus
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                  placeholder={`Search ${options.length} items…`}
                  className="w-full bg-transparent text-sm text-slate-700 placeholder-slate-400 focus:outline-none"
                />
              </div>
            )}
            <div className="mb-1 flex items-center justify-between border-b border-slate-100 px-2 pb-1.5">
              <label className="flex cursor-pointer items-center gap-2 text-xs font-semibold text-slate-700">
                <input
                  type="checkbox"
                  checked={allSelected}
                  onChange={() => onChange([])}
                  className="h-3.5 w-3.5 rounded border-slate-300 accent-indigo-600"
                />
                All (no filter)
              </label>
              <button
                type="button"
                onClick={() => setOpen(false)}
                className="text-[11px] font-semibold text-indigo-600 hover:text-indigo-800"
              >
                Done
              </button>
            </div>
            {allSelected && (
              <p className="px-2 py-1 text-[10px] text-slate-400">
                Showing all data — tick items below to filter.
              </p>
            )}
            <div className="max-h-56 overflow-y-auto">
              {shown.length === 0 && (
                <p className="px-2 py-2 text-xs text-slate-400">No matches.</p>
              )}
              {shown.map((opt) => (
                <label
                  key={opt}
                  className="flex cursor-pointer items-center gap-2 rounded-md px-2 py-1.5 text-sm text-slate-700 hover:bg-indigo-50"
                >
                  <input
                    type="checkbox"
                    checked={selected.includes(opt)}
                    onChange={() => toggle(opt)}
                    className="h-3.5 w-3.5 shrink-0 rounded border-slate-300 accent-indigo-600"
                  />
                  <span className="truncate">{opt}</span>
                </label>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}


// ============================================================
// Dynamic narrative card — sentences recompute with filters
// ============================================================
function Narrative({ title, parts }) {
  return (
    <div className="rounded-xl border border-indigo-100 bg-indigo-50 p-4 shadow-sm">
      <div className="mb-2 flex flex-wrap items-center gap-2">
        <Sparkles className="h-4 w-4 text-indigo-600" />
        <h2 className="text-sm font-bold text-slate-800">{title}</h2>
        <span className="text-[10px] font-semibold uppercase tracking-wide text-indigo-400">
          auto-generated · updates with filters
        </span>
      </div>
      <ul className="space-y-1.5">
        {parts.map((p, i) => (
          <li key={i} className="flex gap-2 text-sm leading-relaxed text-slate-700">
            <span className="mt-1.5 h-1.5 w-1.5 shrink-0 rounded-full bg-indigo-400" />
            <span>{p}</span>
          </li>
        ))}
      </ul>
    </div>
  );
}

function TmsImsDashboard() {
  // ---------- global state ----------
  const [tab, setTab] = useState("overview"); // "overview" | "inventory"
  const [metric, setMetric] = useState("value"); // "qty" | "value"
  const [months, setMonths] = useState([]);
  const [bus, setBus] = useState([]);
  const [lines, setLines] = useState([]);
  const [brands, setBrands] = useState([]);
  const [products, setProducts] = useState([]);
  const [salesTypes, setSalesTypes] = useState([]);
  const [invLevel, setInvLevel] = useState("brand"); // "brand" | "sku"

  // ---------- cascading filter options ----------
  const lineOptions = useMemo(() => {
    const s = new Set(DATA.filter((d) => sel(bus, d.bu)).map((d) => d.line));
    return [...s].sort();
  }, [bus]);

  const brandOptions = useMemo(() => {
    const s = new Set(
      DATA.filter((d) => sel(bus, d.bu) && sel(lines, d.line)).map((d) => d.brand)
    );
    return [...s].sort();
  }, [bus, lines]);

  const productOptions = useMemo(() => {
    const s = new Set(
      DATA.filter(
        (d) => sel(bus, d.bu) && sel(lines, d.line) && sel(brands, d.brand)
      ).map((d) => d.product)
    );
    return [...s].sort();
  }, [bus, lines, brands]);

  // cascade pruning
  const handleBus = (next) => {
    setBus(next);
    const vL = new Set(DATA.filter((d) => sel(next, d.bu)).map((d) => d.line));
    const pL = lines.filter((l) => vL.has(l));
    setLines(pL);
    const vB = new Set(DATA.filter((d) => sel(next, d.bu) && sel(pL, d.line)).map((d) => d.brand));
    const pB = brands.filter((b) => vB.has(b));
    setBrands(pB);
    const vP = new Set(DATA.filter((d) => sel(next, d.bu) && sel(pL, d.line) && sel(pB, d.brand)).map((d) => d.product));
    setProducts(products.filter((p) => vP.has(p)));
  };
  const handleLines = (next) => {
    setLines(next);
    const vB = new Set(DATA.filter((d) => sel(bus, d.bu) && sel(next, d.line)).map((d) => d.brand));
    const pB = brands.filter((b) => vB.has(b));
    setBrands(pB);
    const vP = new Set(DATA.filter((d) => sel(bus, d.bu) && sel(next, d.line) && sel(pB, d.brand)).map((d) => d.product));
    setProducts(products.filter((p) => vP.has(p)));
  };
  const handleBrands = (next) => {
    setBrands(next);
    const vP = new Set(DATA.filter((d) => sel(bus, d.bu) && sel(lines, d.line) && sel(next, d.brand)).map((d) => d.product));
    setProducts(products.filter((p) => vP.has(p)));
  };

  // dimension filter (everything except Month) shared by both tabs
  const dimOk = (d) =>
    sel(bus, d.bu) && sel(lines, d.line) && sel(brands, d.brand) &&
    sel(products, d.product) && sel(salesTypes, d.salesType);

  // ---------- OVERVIEW: filtered dataset ----------
  const filtered = useMemo(
    () => DATA.filter((d) => sel(months, MONTHS[d.month]) && dimOk(d)),
    [months, bus, lines, brands, products, salesTypes]
  );

  const kpi = useMemo(() => {
    let tms = 0, ims = 0;
    for (const d of filtered) {
      if (d.type === TYPE_TMS) tms += d[metric];
      else ims += d[metric];
    }
    const variance = tms - ims;
    const sellOut = tms > 0 ? (ims / tms) * 100 : null;
    return { tms, ims, variance, sellOut };
  }, [filtered, metric]);

  const brandChart = useMemo(() => {
    const map = new Map();
    for (const d of filtered) {
      if (!map.has(d.brand)) map.set(d.brand, { brand: d.brand, TMS: 0, IMS: 0 });
      map.get(d.brand)[d.type === TYPE_TMS ? "TMS" : "IMS"] += d[metric];
    }
    return [...map.values()]
      .sort((a, b) => b.TMS + b.IMS - (a.TMS + a.IMS))
      .slice(0, 12);
  }, [filtered, metric]);

  const trendChart = useMemo(() => {
    const rows = MONTHS.map((m) => ({ month: m, TMS: 0, IMS: 0 }));
    for (const d of DATA) {
      if (!dimOk(d)) continue;
      rows[d.month][d.type === TYPE_TMS ? "TMS" : "IMS"] += d[metric];
    }
    return rows;
  }, [bus, lines, brands, products, salesTypes, metric]);

  // ---------- insights (overview bottom row) ----------
  const insights = useMemo(() => {
    const map = new Map();
    for (const d of DATA) {
      if (d.month > LAST_IMS_MONTH) continue; // exclude reporting-gap months
      if (!sel(months, MONTHS[d.month])) continue;
      if (!sel(bus, d.bu) || !sel(lines, d.line) || !sel(salesTypes, d.salesType)) continue;
      if (!map.has(d.brand)) map.set(d.brand, { TMS: 0, IMS: 0 });
      map.get(d.brand)[d.type === TYPE_TMS ? "TMS" : "IMS"] += d[metric];
    }
    const risks = [], bottlenecks = [];
    for (const [b, v] of map) {
      if (v.TMS === 0 && v.IMS === 0) continue;
      if (v.IMS > v.TMS)
        risks.push({ brand: b, gap: v.IMS - v.TMS, rate: v.TMS > 0 ? (v.IMS / v.TMS) * 100 : null });
      else if (v.TMS > 0 && (v.IMS / v.TMS) * 100 < 50)
        bottlenecks.push({ brand: b, gap: v.TMS - v.IMS, rate: (v.IMS / v.TMS) * 100 });
    }
    risks.sort((a, b) => b.gap - a.gap);
    bottlenecks.sort((a, b) => b.gap - a.gap);
    return { risks, bottlenecks };
  }, [months, bus, lines, salesTypes, metric]);

  // ---------- CHANNEL INVENTORY: implied inventory, MoC, stockout ----------
  const inventory = useMemo(() => {
    const byKey = new Map();
    for (const d of DATA) {
      if (!dimOk(d)) continue;
      const key = invLevel === "sku" ? d.product : d.brand;
      let o = byKey.get(key);
      if (!o) {
        o = { key, brand: d.brand, code: d.code,
              tms: Array(N_MONTHS).fill(0), ims: Array(N_MONTHS).fill(0) };
        byKey.set(key, o);
      }
      (d.type === TYPE_TMS ? o.tms : o.ims)[d.month] += d[metric];
    }
    const rows = [...byKey.values()].map((o) => {
      const cumT = o.tms.reduce((a, b) => a + b, 0);
      const cumI = o.ims.slice(0, LAST_IMS_MONTH + 1).reduce((a, b) => a + b, 0);
      const win = o.ims.slice(Math.max(0, LAST_IMS_MONTH - 2), LAST_IMS_MONTH + 1);
      const run = win.reduce((a, b) => a + b, 0) / win.length; // 3-mo avg IMS run-rate
      const runP = cumI / (LAST_IMS_MONTH + 1); // full-period avg IMS run-rate
      const inv = cumT - cumI;
      const moc = run > 0 ? inv / run : null;
      return { ...o, cumT, cumI, run, runP, inv, moc };
    });
    // sort: stockout risk first (asc MoC, negatives first), no-offtake last
    rows.sort((a, b) => {
      if (a.moc === null && b.moc === null) return b.inv - a.inv;
      if (a.moc === null) return 1;
      if (b.moc === null) return -1;
      return a.moc - b.moc;
    });
    // portfolio KPIs
    let totInv = 0, totRun = 0, nRisk = 0, nOver = 0;
    for (const r of rows) {
      totInv += r.inv; totRun += r.run;
      if (r.moc !== null && r.moc < 1) nRisk++;
      if (r.moc !== null && r.moc > 3) nOver++;
    }
    return { rows, totInv, portMoc: totRun > 0 ? totInv / totRun : null, nRisk, nOver };
  }, [bus, lines, brands, products, salesTypes, metric, invLevel]);

  // MoC heatmap (brand level, per month: trailing cum inventory / trailing 3-mo IMS)
  const heatmap = useMemo(() => {
    const byBrand = new Map();
    for (const d of DATA) {
      if (!dimOk(d)) continue;
      let o = byBrand.get(d.brand);
      if (!o) {
        o = { brand: d.brand, tms: Array(N_MONTHS).fill(0), ims: Array(N_MONTHS).fill(0) };
        byBrand.set(d.brand, o);
      }
      (d.type === TYPE_TMS ? o.tms : o.ims)[d.month] += d[metric];
    }
    const rows = [...byBrand.values()].map((o) => {
      const cells = MONTHS.map((_, m) => {
        if (m > LAST_IMS_MONTH) return null; // IMS gap
        const cumT = o.tms.slice(0, m + 1).reduce((a, b) => a + b, 0);
        const cumI = o.ims.slice(0, m + 1).reduce((a, b) => a + b, 0);
        const win = o.ims.slice(Math.max(0, m - 2), m + 1);
        const run = win.reduce((a, b) => a + b, 0) / win.length;
        return run > 0 ? (cumT - cumI) / run : null;
      });
      const size = o.tms.reduce((a, b) => a + b, 0) + o.ims.reduce((a, b) => a + b, 0);
      return { brand: o.brand, cells, size };
    });
    return rows.sort((a, b) => b.size - a.size).slice(0, 20);
  }, [bus, lines, brands, products, salesTypes, metric]);

  const metricLabel = metric === "qty" ? "Units" : "EGP";

  // ---------- dynamic narrative: overview ----------
  const overviewStory = useMemo(() => {
    const parts = [];
    const scope = [];
    if (months.length) scope.push(`months ${months.join(", ")}`);
    if (bus.length) scope.push(`BU ${bus.join(", ")}`);
    if (lines.length) scope.push(`line ${lines.join(", ")}`);
    if (brands.length) scope.push(`brand ${brands.join(", ")}`);
    if (products.length) scope.push(`${products.length} SKU${products.length === 1 ? "" : "s"}`);
    if (salesTypes.length) scope.push(`${salesTypes.join(", ")} only`);
    parts.push(scope.length
      ? `Filtered view: ${scope.join(" · ")}.`
      : `Full portfolio view, ${MONTHS[0]}–${MONTHS[N_MONTHS - 1]}, all business units and sales types.`);

    if (kpi.tms === 0 && kpi.ims === 0) {
      parts.push("No transactions match the current filters — widen the selection.");
      return parts;
    }
    if (kpi.sellOut === null) {
      parts.push(`No sell-in in this selection while sell-out totals ${fmtCompact(kpi.ims)} ${metricLabel} — the distributor is selling entirely from existing stock.`);
    } else if (kpi.sellOut > 100) {
      parts.push(`In-Market Sales (${fmtCompact(kpi.ims)}) exceed To-Market Sales (${fmtCompact(kpi.tms)}) by ${fmtCompact(-kpi.variance)} ${metricLabel} — a ${kpi.sellOut.toFixed(0)}% sell-out rate. The market is absorbing more than is being shipped; channel stock is being drawn down.`);
    } else if (kpi.sellOut >= 80) {
      parts.push(`Sell-out rate is ${kpi.sellOut.toFixed(0)}% (${fmtCompact(kpi.ims)} of ${fmtCompact(kpi.tms)} ${metricLabel}) — healthy throughput; shipments and demand are broadly in balance with a net stock build of ${fmtCompact(kpi.variance)} ${metricLabel}.`);
    } else {
      parts.push(`Only ${kpi.sellOut.toFixed(0)}% of sell-in is selling through (${fmtCompact(kpi.ims)} of ${fmtCompact(kpi.tms)} ${metricLabel}); ${fmtCompact(kpi.variance)} ${metricLabel} is accumulating in the channel — question the shipment plan for this selection.`);
    }
    const li = LAST_IMS_MONTH;
    if (li >= 1) {
      const cur = trendChart[li], prev = trendChart[li - 1];
      if (prev.IMS > 0 && cur.IMS > 0) {
        const g = ((cur.IMS - prev.IMS) / prev.IMS) * 100;
        const gT = prev.TMS > 0 ? ((cur.TMS - prev.TMS) / prev.TMS) * 100 : null;
        let s = `Momentum: In-Market Sales ${g >= 0 ? "grew" : "declined"} ${Math.abs(g).toFixed(0)}% in ${MONTHS[li]} vs ${MONTHS[li - 1]}`;
        if (gT !== null) s += `, while To-Market Sales ${gT >= 0 ? "grew" : "declined"} ${Math.abs(gT).toFixed(0)}%`;
        if (gT !== null && gT - g > 25) s += " — sell-in is outpacing sell-out; watch for channel loading";
        if (gT !== null && g - gT > 25) s += " — demand is outrunning shipments; secure supply";
        parts.push(s + ".");
      }
    }
    if (brandChart.length > 1) {
      const tot = brandChart.reduce((a, b) => a + b.TMS + b.IMS, 0);
      const top = brandChart[0];
      parts.push(`${top.brand} is the largest brand in this view at ${(((top.TMS + top.IMS) / tot) * 100).toFixed(0)}% of combined activity across the top ${brandChart.length}.`);
    }
    if (insights.risks.length || insights.bottlenecks.length) {
      let s = `Exceptions: ${insights.risks.length} out-of-stock risk${insights.risks.length === 1 ? "" : "s"} and ${insights.bottlenecks.length} inventory bottleneck${insights.bottlenecks.length === 1 ? "" : "s"} flagged`;
      if (insights.risks[0]) s += ` — largest depletion gap: ${insights.risks[0].brand} (−${fmtCompact(insights.risks[0].gap)} ${metricLabel})`;
      if (insights.bottlenecks[0]) s += `; largest idle stock: ${insights.bottlenecks[0].brand} (+${fmtCompact(insights.bottlenecks[0].gap)} ${metricLabel})`;
      parts.push(s + ".");
    } else {
      parts.push("No exception alerts in this selection.");
    }
    return parts;
  }, [kpi, trendChart, brandChart, insights, months, bus, lines, brands, products, salesTypes, metricLabel]);

  // ---------- dynamic narrative: channel inventory ----------
  const invStory = useMemo(() => {
    const parts = [];
    const rows = inventory.rows;
    if (!rows.length) { parts.push("No items match the current filters."); return parts; }
    const lvl = invLevel === "sku" ? "SKU" : "brand";
    parts.push(inventory.totInv >= 0
      ? `An estimated ${fmtCompact(inventory.totInv)} ${metricLabel} is sitting at the distributor${inventory.portMoc !== null ? ` — ${inventory.portMoc.toFixed(1)} months of coverage at the current run-rate` : ""}.`
      : `Net implied inventory is negative (${fmtCompact(inventory.totInv)} ${metricLabel}): the distributor has sold more than was shipped since ${MONTHS[0]}, meaning pre-period stock is being drawn down.`);
    const risk = rows.filter((r) => r.moc !== null && r.moc >= 0 && r.moc < 1);
    const over = rows.filter((r) => r.moc !== null && r.moc > 3);
    const neg = rows.filter((r) => r.inv < 0);
    if (risk.length) {
      const first = risk[0];
      parts.push(`${risk.length} ${lvl}${risk.length === 1 ? " is" : "s are"} below one month of cover — most urgent: ${first.key} (${first.moc.toFixed(1)} MoC, projected stockout ~${projectDate(first.moc)}). Prioritize replenishment.`);
    } else {
      parts.push(`No ${lvl}s are currently below one month of cover.`);
    }
    if (over.length) {
      const worst = over.reduce((a, b) => (b.moc > a.moc ? b : a), over[0]);
      parts.push(`${over.length} ${lvl}${over.length === 1 ? " sits" : "s sit"} above three months of cover — heaviest: ${worst.key} at ${worst.moc > 24 ? ">24" : worst.moc.toFixed(1)} months. Review expiry exposure and pause non-essential shipments.`);
    }
    if (neg.length) {
      parts.push(`${neg.length} ${lvl}${neg.length === 1 ? " shows" : "s show"} negative implied inventory (pre-${MONTHS[0]} stock being sold). Request opening balances from the distributor to calibrate these figures.`);
    }
    const accel = rows.filter((r) => r.runP > 0 && r.run / r.runP >= 1.25).length;
    const decel = rows.filter((r) => r.runP > 0 && r.run / r.runP <= 0.75).length;
    if (accel || decel) {
      parts.push(`Demand shift: ${accel} ${lvl}${accel === 1 ? "" : "s"} accelerating (last-3M run-rate ≥125% of period average) and ${decel} decelerating (≤75%). Coverage erodes faster than shown for accelerating items.`);
    }
    return parts;
  }, [inventory, invLevel, metricLabel]);

  // ---------- PULL-THROUGH ANALYSIS: lagged TMS(M-1) → IMS(M) ----------
  const lagPairs = useMemo(() => {
    // Build monthly TMS & IMS by brand
    const byBrand = new Map();
    for (const d of DATA) {
      if (!dimOk(d)) continue;
      let o = byBrand.get(d.brand);
      if (!o) {
        o = { brand: d.brand, tms: Array(N_MONTHS).fill(0), ims: Array(N_MONTHS).fill(0) };
        byBrand.set(d.brand, o);
      }
      (d.type === TYPE_TMS ? o.tms : o.ims)[d.month] += d[metric];
    }

    // Build lag pairs: TMS(m) drives IMS(m+1)
    const pairs = [];
    for (let m = 0; m < N_MONTHS - 1; m++) {
      const nextM = m + 1;
      // Check if IMS exists for nextM (globally)
      const hasIms = DATA.some((d) => d.month === nextM && d.type !== TYPE_TMS);
      if (!hasIms) continue;
      let totTms = 0, totIms = 0;
      const brandPT = [];
      for (const [br, o] of byBrand) {
        const t = o.tms[m], i = o.ims[nextM];
        totTms += t; totIms += i;
        if (t > 0) brandPT.push({ brand: br, tms: t, ims: i, pt: (i / t) * 100 });
      }
      pairs.push({
        label: `${MONTHS[m].split(" ")[0]}→${MONTHS[nextM].split(" ")[0]}`,
        tmsMonth: MONTHS[m], imsMonth: MONTHS[nextM],
        tms: totTms, ims: totIms,
        pt: totTms > 0 ? (totIms / totTms) * 100 : null,
        brands: brandPT.sort((a, b) => b.tms - a.tms)
      });
    }
    return pairs;
  }, [bus, lines, brands, products, salesTypes, metric]);

  // Portfolio-level pull-through KPIs
  const ptKpi = useMemo(() => {
    if (!lagPairs.length) return { avgPt: null, bestPair: null, worstPair: null, trend: null };
    const valid = lagPairs.filter((p) => p.pt !== null);
    const avgPt = valid.length ? valid.reduce((s, p) => s + p.pt, 0) / valid.length : null;
    const bestPair = valid.reduce((a, b) => (b.pt > a.pt ? b : a), valid[0]);
    const worstPair = valid.reduce((a, b) => (b.pt < a.pt ? b : a), valid[0]);
    const trend = valid.length >= 2
      ? valid[valid.length - 1].pt - valid[0].pt : null;
    return { avgPt, bestPair, worstPair, trend };
  }, [lagPairs]);

  // Brand-level pull-through summary (across all lag periods)
  const brandPT = useMemo(() => {
    const map = new Map();
    for (const pair of lagPairs) {
      for (const b of pair.brands) {
        let o = map.get(b.brand);
        if (!o) o = { brand: b.brand, tms: 0, ims: 0, pairs: 0 };
        o.tms += b.tms; o.ims += b.ims; o.pairs++;
        map.set(b.brand, o);
      }
    }
    return [...map.values()]
      .map((o) => ({ ...o, pt: o.tms > 0 ? (o.ims / o.tms) * 100 : null }))
      .filter((o) => o.pt !== null)
      .sort((a, b) => b.tms - a.tms);
  }, [lagPairs]);

  // Pull-through heatmap (brand x lag pair)
  const ptHeatmap = useMemo(() => {
    const topBrands = brandPT.slice(0, 20);
    return topBrands.map((b) => {
      const cells = lagPairs.map((pair) => {
        const match = pair.brands.find((x) => x.brand === b.brand);
        return match ? match.pt : null;
      });
      return { brand: b.brand, cells, avgPt: b.pt };
    });
  }, [brandPT, lagPairs]);

  // TMS vs IMS growth gap by period
  const growthGap = useMemo(() => {
    if (lagPairs.length < 2) return [];
    return lagPairs.slice(1).map((cur, i) => {
      const prev = lagPairs[i];
      const tmsG = prev.tms > 0 ? ((cur.tms - prev.tms) / prev.tms) * 100 : null;
      const imsG = prev.ims > 0 ? ((cur.ims - prev.ims) / prev.ims) * 100 : null;
      return { label: cur.label, tmsGrowth: tmsG, imsGrowth: imsG,
               gap: tmsG !== null && imsG !== null ? tmsG - imsG : null };
    });
  }, [lagPairs]);

  // Lag narrative
  const lagStory = useMemo(() => {
    const parts = [];
    if (!lagPairs.length) { parts.push("Insufficient data for lagged analysis."); return parts; }

    parts.push(ptKpi.avgPt !== null
      ? `Average pull-through rate across ${lagPairs.length} lag periods is ${ptKpi.avgPt.toFixed(0)}% — ${
          ptKpi.avgPt >= 85 ? "strong channel absorption; supply and demand are well-aligned" :
          ptKpi.avgPt >= 65 ? "moderate absorption; some inventory build-up each cycle" :
          "low pull-through; significant inventory accumulation — review demand forecasting and shipment cadence"
        }.`
      : "No valid pull-through data for current filters.");

    if (ptKpi.trend !== null) {
      parts.push(`Trend: pull-through ${ptKpi.trend >= 0 ? "improved" : "deteriorated"} by ${Math.abs(ptKpi.trend).toFixed(0)}pp from first to last period${
        ptKpi.trend >= 10 ? " — channel is absorbing faster, healthy trajectory for a growth-phase company" :
        ptKpi.trend <= -10 ? " — channel absorption is weakening; pipeline may be overfilled" :
        " — relatively stable absorption"
      }.`);
    }

    if (ptKpi.bestPair && ptKpi.worstPair && ptKpi.bestPair.label !== ptKpi.worstPair.label) {
      parts.push(`Best period: ${ptKpi.bestPair.label} at ${ptKpi.bestPair.pt.toFixed(0)}%. Weakest: ${ptKpi.worstPair.label} at ${ptKpi.worstPair.pt.toFixed(0)}%.`);
    }

    if (brandPT.length) {
      const high = brandPT.filter((b) => b.pt >= 100);
      const low = brandPT.filter((b) => b.pt < 50);
      if (high.length) parts.push(`${high.length} brand${high.length === 1 ? "" : "s"} with ≥100% pull-through (channel depleting stock): ${high.slice(0, 3).map((b) => b.brand).join(", ")}${high.length > 3 ? ` +${high.length - 3} more` : ""}. Ensure adequate supply.`);
      if (low.length) parts.push(`${low.length} brand${low.length === 1 ? "" : "s"} below 50% pull-through (heavy channel loading): ${low.slice(0, 3).map((b) => b.brand).join(", ")}${low.length > 3 ? ` +${low.length - 3} more` : ""}. Pause shipments or investigate demand barriers.`);
    }

    return parts;
  }, [lagPairs, ptKpi, brandPT]);

  const activeGapMonths = GAP_MONTHS.filter((m) => sel(months, m));
  const onlyGapSelected = months.length > 0 && months.every((m) => GAP_MONTHS.includes(m));
  const activeFilterCount =
    [months, bus, lines, brands, products, salesTypes].filter((a) => a.length > 0).length;
  const resetFilters = () => {
    setMonths([]); setBus([]); setLines([]); setBrands([]); setProducts([]); setSalesTypes([]);
  };

  const ChartTooltip = ({ active, payload, label }) => {
    if (!active || !payload?.length) return null;
    return (
      <div className="rounded-lg border border-slate-200 bg-white px-3 py-2 shadow-lg text-xs">
        <p className="font-semibold text-slate-700 mb-1">{label}</p>
        {payload.map((p) => (
          <p key={p.dataKey} style={{ color: p.color }} className="font-medium">
            {p.dataKey === "TMS" ? "To-Market Sales (TMS)" : "In-Market Sales (IMS)"}: {fmtFull(p.value)} {metricLabel}
          </p>
        ))}
      </div>
    );
  };

  const KpiCard = ({ icon: Icon, label, sub, value, accent, badge }) => (
    <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <div className="flex items-center justify-between">
        <div className={`rounded-lg p-2 ${accent.bg}`}>
          <Icon className={`h-5 w-5 ${accent.text}`} />
        </div>
        {badge}
      </div>
      <p className="mt-3 text-[11px] font-semibold uppercase tracking-wide text-slate-500">{label}</p>
      <p className={`text-2xl font-bold tabular-nums ${accent.value ?? "text-slate-900"}`}>{value}</p>
      <p className="text-xs text-slate-400">{sub}</p>
    </div>
  );

  const varianceNegative = kpi.variance < 0;

  return (
    <div className="min-h-screen bg-slate-100 p-4 md:p-6 font-sans">
      <div className="mx-auto max-w-7xl space-y-4">

        {/* ================= HEADER + TABS + FILTER BAR ================= */}
        <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <div className="flex flex-wrap items-center justify-between gap-3">
            <div className="flex items-center gap-3">
              <div className="rounded-lg bg-indigo-600 p-2">
                <LayoutDashboard className="h-5 w-5 text-white" />
              </div>
              <div>
                <h1 className="text-lg font-bold text-slate-900 leading-tight">
                  Sell-In vs Sell-Out Control Tower
                </h1>
                <p className="text-xs text-slate-500">
                  To-Market Sales (TMS · shipments to distributor) vs In-Market Sales (IMS · sales to market) · {MONTHS[0]}–{MONTHS[N_MONTHS - 1]}
                </p>
              </div>
            </div>

            <div className="flex items-center rounded-lg border border-slate-300 bg-slate-50 p-0.5">
              {[
                { id: "qty", label: "QTY (Volume)" },
                { id: "value", label: "Value (EGP)" },
              ].map((m) => (
                <button
                  key={m.id}
                  onClick={() => setMetric(m.id)}
                  className={`rounded-md px-3 py-1.5 text-sm font-semibold transition-colors ${
                    metric === m.id ? "bg-indigo-600 text-white shadow" : "text-slate-600 hover:text-slate-900"
                  }`}
                >
                  {m.label}
                </button>
              ))}
            </div>
          </div>

          {/* Tabs */}
          <div className="mt-4 flex gap-1 border-b border-slate-200">
            {[
              { id: "overview", label: "Overview", Icon: LayoutDashboard },
              { id: "inventory", label: "Channel Inventory", Icon: Warehouse },
              { id: "pullthrough", label: "Pull-Through Analysis", Icon: Repeat },
            ].map(({ id, label, Icon }) => (
              <button
                key={id}
                onClick={() => setTab(id)}
                className={`flex items-center gap-1.5 rounded-t-lg px-4 py-2 text-sm font-semibold transition-colors ${
                  tab === id
                    ? "border-b-2 border-indigo-600 bg-indigo-50 text-indigo-700"
                    : "text-slate-500 hover:text-slate-800"
                }`}
              >
                <Icon className="h-4 w-4" />
                {label}
              </button>
            ))}
          </div>

          <div className="mt-3 flex flex-wrap items-end gap-3">
            <Filter className="mb-2 h-4 w-4 text-slate-400" />
            {tab === "overview" && (
              <MultiSelect label="Month" options={MONTHS} selected={months} onChange={setMonths} />
            )}
            <MultiSelect label="Business Unit" options={BUS} selected={bus} onChange={handleBus} />
            <MultiSelect label="Line" options={lineOptions} selected={lines} onChange={handleLines} />
            <MultiSelect label="Brand" options={brandOptions} selected={brands} onChange={handleBrands} />
            <MultiSelect label="Product (SKU)" options={productOptions} selected={products} onChange={setProducts} wide />
            <MultiSelect label="Sales Type" options={STYPES} selected={salesTypes} onChange={setSalesTypes} />
            {activeFilterCount > 0 && (
              <button
                type="button"
                onClick={resetFilters}
                className="mb-0.5 rounded-lg border border-slate-300 px-3 py-1.5 text-xs font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-900"
              >
                Reset ({activeFilterCount})
              </button>
            )}
          </div>
        </div>

        {/* ======================================================= */}
        {/* ===================== OVERVIEW TAB ==================== */}
        {/* ======================================================= */}
        {tab === "overview" && (
          <>
            {activeGapMonths.length > 0 && (
              <div className="flex items-start gap-2 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
                <Info className="mt-0.5 h-4 w-4 shrink-0" />
                <span>
                  <strong>Data coverage:</strong> IMS not yet reported for {activeGapMonths.join(", ")}.{" "}
                  {onlyGapSelected
                    ? "Sell-out KPIs for this selection reflect a reporting gap, not zero demand."
                    : "Aggregate sell-out rate is understated; insights below exclude unreported months."}
                </span>
              </div>
            )}

            <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
              <KpiCard
                icon={Truck} label="Total TMS · To-Market Sales"
                value={fmtCompact(kpi.tms)} sub={`${fmtFull(kpi.tms)} ${metricLabel}`}
                accent={{ bg: "bg-indigo-50", text: "text-indigo-700" }}
              />
              <KpiCard
                icon={ShoppingCart} label="Total IMS · In-Market Sales"
                value={fmtCompact(kpi.ims)} sub={`${fmtFull(kpi.ims)} ${metricLabel}`}
                accent={{ bg: "bg-teal-50", text: "text-teal-700" }}
              />
              <KpiCard
                icon={Scale} label="Variance (TMS − IMS)"
                value={(kpi.variance > 0 ? "+" : "") + fmtCompact(kpi.variance)}
                sub={varianceNegative ? "Market pulling from distributor stock" : "Net inventory building at distributor"}
                accent={varianceNegative
                  ? { bg: "bg-red-50", text: "text-red-600", value: "text-red-600" }
                  : { bg: "bg-sky-50", text: "text-sky-700", value: "text-sky-700" }}
                badge={
                  <span className={`rounded-full px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide ${
                    varianceNegative ? "bg-red-100 text-red-700" : "bg-sky-100 text-sky-700"
                  }`}>
                    {varianceNegative ? "Stock depletion" : "Stock buildup"}
                  </span>
                }
              />
              <KpiCard
                icon={Percent} label="Sell-Out Rate (IMS ÷ TMS)"
                value={kpi.sellOut === null ? "N/A" : kpi.sellOut.toFixed(1) + "%"}
                sub={kpi.sellOut === null ? "No sell-in in current selection"
                  : kpi.sellOut > 100 ? "Demand exceeds shipments"
                  : kpi.sellOut >= 80 ? "Healthy channel throughput" : "Slow channel offtake"}
                accent={kpi.sellOut === null ? { bg: "bg-slate-100", text: "text-slate-500" }
                  : kpi.sellOut > 100 ? { bg: "bg-red-50", text: "text-red-600", value: "text-red-600" }
                  : kpi.sellOut >= 80 ? { bg: "bg-emerald-50", text: "text-emerald-700", value: "text-emerald-700" }
                  : { bg: "bg-amber-50", text: "text-amber-600", value: "text-amber-600" }}
              />
            </div>

            <Narrative title="Executive Narrative" parts={overviewStory} />

            <div className="grid grid-cols-1 gap-4 lg:grid-cols-2">
              <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
                <h2 className="text-sm font-bold text-slate-800">Brand Comparison — To-Market vs In-Market Sales</h2>
                <p className="mb-2 text-xs text-slate-400">
                  Top {brandChart.length} brands by combined {metric === "qty" ? "volume" : "value"} in current selection
                </p>
                <ResponsiveContainer width="100%" height={320}>
                  <BarChart data={brandChart} margin={{ top: 5, right: 10, left: 0, bottom: 45 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" vertical={false} />
                    <XAxis dataKey="brand" angle={-40} textAnchor="end" interval={0} tick={{ fontSize: 10, fill: "#64748b" }} />
                    <YAxis tickFormatter={fmtCompact} tick={{ fontSize: 11, fill: "#64748b" }} width={52} />
                    <Tooltip content={<ChartTooltip />} />
                    <Legend verticalAlign="top" height={28}
                      formatter={(v) => (v === "TMS" ? "To-Market Sales (TMS)" : "In-Market Sales (IMS)")}
                      wrapperStyle={{ fontSize: 12 }} />
                    <Bar dataKey="TMS" fill={COLORS.tms} radius={[3, 3, 0, 0]} />
                    <Bar dataKey="IMS" fill={COLORS.ims} radius={[3, 3, 0, 0]} />
                  </BarChart>
                </ResponsiveContainer>
              </div>

              <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
                <h2 className="text-sm font-bold text-slate-800">Monthly Trend — Seasonality & Divergence</h2>
                <p className="mb-2 text-xs text-slate-400">Full-year axis; Month filter intentionally not applied here</p>
                <ResponsiveContainer width="100%" height={320}>
                  <ComposedChart data={trendChart} margin={{ top: 5, right: 10, left: 0, bottom: 0 }}>
                    <defs>
                      <linearGradient id="gTms" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor={COLORS.tms} stopOpacity={0.18} />
                        <stop offset="100%" stopColor={COLORS.tms} stopOpacity={0} />
                      </linearGradient>
                      <linearGradient id="gIms" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor={COLORS.ims} stopOpacity={0.18} />
                        <stop offset="100%" stopColor={COLORS.ims} stopOpacity={0} />
                      </linearGradient>
                    </defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" vertical={false} />
                    <XAxis dataKey="month" tick={{ fontSize: 12, fill: "#64748b" }} />
                    <YAxis tickFormatter={fmtCompact} tick={{ fontSize: 11, fill: "#64748b" }} width={52} />
                    <Tooltip content={<ChartTooltip />} />
                    <Legend verticalAlign="top" height={28}
                      formatter={(v) => (v === "TMS" ? "To-Market Sales (TMS)" : "In-Market Sales (IMS)")}
                      wrapperStyle={{ fontSize: 12 }} />
                    <Area dataKey="TMS" stroke="none" fill="url(#gTms)" />
                    <Area dataKey="IMS" stroke="none" fill="url(#gIms)" />
                    <Line dataKey="TMS" stroke={COLORS.tms} strokeWidth={2.5} dot={{ r: 3 }} />
                    <Line dataKey="IMS" stroke={COLORS.ims} strokeWidth={2.5} dot={{ r: 3 }} />
                  </ComposedChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <div className="mb-3 flex items-center gap-2">
                <AlertTriangle className="h-4 w-4 text-amber-500" />
                <h2 className="text-sm font-bold text-slate-800">Risks & Opportunities</h2>
                <span className="text-xs text-slate-400">
                  Brand-level, respects Month / BU / Line / Sales Type filters · IMS-unreported months excluded
                </span>
              </div>
              <div className="grid grid-cols-1 gap-4 md:grid-cols-2">
                <div>
                  <p className="mb-2 flex items-center gap-1.5 text-xs font-bold uppercase tracking-wide text-red-600">
                    <TrendingDown className="h-3.5 w-3.5" />
                    Out-of-Stock Risk (IMS &gt; TMS) · {insights.risks.length}
                  </p>
                  <div className="max-h-56 space-y-1.5 overflow-y-auto pr-1">
                    {insights.risks.length === 0 && (
                      <p className="flex items-center gap-1.5 text-sm text-slate-400">
                        <CheckCircle2 className="h-4 w-4 text-emerald-500" /> No brands selling out faster than supply.
                      </p>
                    )}
                    {insights.risks.map((r) => (
                      <div key={r.brand} className="flex items-center justify-between rounded-lg border border-red-100 bg-red-50 px-3 py-2">
                        <span className="text-sm font-semibold text-red-800">Out of Stock Risk for {r.brand}</span>
                        <span className="text-xs font-medium tabular-nums text-red-600">
                          −{fmtCompact(r.gap)} {metricLabel}
                          {r.rate !== null && ` · ${r.rate.toFixed(0)}% sell-out`}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <p className="mb-2 flex items-center gap-1.5 text-xs font-bold uppercase tracking-wide text-amber-600">
                    <Package className="h-3.5 w-3.5" />
                    Inventory Bottleneck (&lt;50% Sell-Out) · {insights.bottlenecks.length}
                  </p>
                  <div className="max-h-56 space-y-1.5 overflow-y-auto pr-1">
                    {insights.bottlenecks.length === 0 && (
                      <p className="flex items-center gap-1.5 text-sm text-slate-400">
                        <CheckCircle2 className="h-4 w-4 text-emerald-500" /> No brands below 50% sell-out.
                      </p>
                    )}
                    {insights.bottlenecks.map((r) => (
                      <div key={r.brand} className="flex items-center justify-between rounded-lg border border-amber-100 bg-amber-50 px-3 py-2">
                        <span className="text-sm font-semibold text-amber-800">Inventory Bottleneck for {r.brand}</span>
                        <span className="text-xs font-medium tabular-nums text-amber-600">
                          +{fmtCompact(r.gap)} {metricLabel} idle · {r.rate.toFixed(0)}% sell-out
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </>
        )}

        {/* ======================================================= */}
        {/* ================ CHANNEL INVENTORY TAB ================ */}
        {/* ======================================================= */}
        {tab === "inventory" && (
          <>
            <div className="flex items-start gap-2 rounded-xl border border-sky-200 bg-sky-50 px-4 py-3 text-xs text-sky-800">
              <Info className="mt-0.5 h-4 w-4 shrink-0" />
              <span>
                <strong>Methodology:</strong> Implied inventory = cumulative TMS ({MONTHS[0]}–{MONTHS[LAST_DATA_MONTH]}) − cumulative IMS ({MONTHS[0]}–{MONTHS[LAST_IMS_MONTH]}), assuming zero opening stock on Jan 1.
                Months of Coverage (MoC) = implied inventory ÷ trailing 3-month IMS run-rate. Negative inventory means the distributor sold from pre-{MONTHS[0]} stock — request an opening balance to calibrate.
                Month filter does not apply (cumulative view). QTY view recommended for inventory decisions.
              </span>
            </div>

            {/* Inventory KPI cards */}
            <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
              <KpiCard
                icon={Warehouse} label="Implied Channel Inventory"
                value={fmtCompact(inventory.totInv)}
                sub={`${fmtFull(inventory.totInv)} ${metricLabel} at distributor (est.)`}
                accent={inventory.totInv < 0
                  ? { bg: "bg-violet-50", text: "text-violet-700", value: "text-violet-700" }
                  : { bg: "bg-indigo-50", text: "text-indigo-700" }}
              />
              <KpiCard
                icon={CalendarClock} label="Portfolio Months of Coverage"
                value={inventory.portMoc === null ? "N/A" : inventory.portMoc.toFixed(1) + " mo"}
                sub="Implied inventory ÷ 3-mo IMS run-rate"
                accent={inventory.portMoc === null ? { bg: "bg-slate-100", text: "text-slate-500" }
                  : inventory.portMoc < 1 ? { bg: "bg-red-50", text: "text-red-600", value: "text-red-600" }
                  : inventory.portMoc <= 3 ? { bg: "bg-emerald-50", text: "text-emerald-700", value: "text-emerald-700" }
                  : { bg: "bg-amber-50", text: "text-amber-600", value: "text-amber-600" }}
              />
              <KpiCard
                icon={AlertTriangle} label={`Stockout Risk (${invLevel === "sku" ? "SKUs" : "Brands"} < 1 MoC)`}
                value={String(inventory.nRisk)}
                sub="Coverage below one month of demand"
                accent={inventory.nRisk > 0
                  ? { bg: "bg-red-50", text: "text-red-600", value: "text-red-600" }
                  : { bg: "bg-emerald-50", text: "text-emerald-700" }}
              />
              <KpiCard
                icon={Boxes} label={`Overstock (${invLevel === "sku" ? "SKUs" : "Brands"} > 3 MoC)`}
                value={String(inventory.nOver)}
                sub="Expiry / return / working-capital risk"
                accent={inventory.nOver > 0
                  ? { bg: "bg-amber-50", text: "text-amber-600", value: "text-amber-600" }
                  : { bg: "bg-emerald-50", text: "text-emerald-700" }}
              />
            </div>

            <Narrative title="Channel Inventory Narrative" parts={invStory} />

            {/* Coverage table */}
            <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <div className="mb-3 flex flex-wrap items-center justify-between gap-2">
                <div>
                  <h2 className="text-sm font-bold text-slate-800">Coverage & Stockout Projection</h2>
                  <p className="text-xs text-slate-400">
                    Sorted by urgency (lowest coverage first) · Last-3M run-rate = avg IMS {MONTHS[Math.max(0, LAST_IMS_MONTH - 2)]}–{MONTHS[LAST_IMS_MONTH]} · Period run-rate = avg IMS {MONTHS[0]}–{MONTHS[LAST_IMS_MONTH]}
                  </p>
                </div>
                <div className="flex items-center rounded-lg border border-slate-300 bg-slate-50 p-0.5">
                  {[
                    { id: "brand", label: "By Brand" },
                    { id: "sku", label: "By Product (SKU)" },
                  ].map((l) => (
                    <button
                      key={l.id}
                      onClick={() => setInvLevel(l.id)}
                      className={`rounded-md px-3 py-1 text-xs font-semibold transition-colors ${
                        invLevel === l.id ? "bg-indigo-600 text-white shadow" : "text-slate-600 hover:text-slate-900"
                      }`}
                    >
                      {l.label}
                    </button>
                  ))}
                </div>
              </div>

              <div className="max-h-[420px] overflow-auto rounded-lg border border-slate-100">
                <table className="w-full min-w-[900px] text-left text-sm">
                  <thead className="sticky top-0 bg-slate-50 text-[11px] uppercase tracking-wide text-slate-500">
                    <tr>
                      <th className="px-3 py-2">{invLevel === "sku" ? "Product (SKU)" : "Brand"}</th>
                      {invLevel === "sku" && <th className="px-3 py-2">Brand</th>}
                      <th className="px-3 py-2 text-right">Cum TMS</th>
                      <th className="px-3 py-2 text-right">Cum IMS</th>
                      <th className="px-3 py-2 text-right">Implied Inv.</th>
                      <th className="px-3 py-2 text-right">IMS Run-rate /mo (Last 3M)</th>
                      <th className="px-3 py-2 text-right">Period Run-rate /mo</th>
                      <th className="px-3 py-2 text-right">MoC</th>
                      <th className="px-3 py-2">Status</th>
                      <th className="px-3 py-2">Proj. Stockout</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {inventory.rows.map((r) => {
                      const st = mocStatus(r.inv, r.moc);
                      return (
                        <tr key={r.key} className="hover:bg-slate-50">
                          <td className="max-w-[240px] truncate px-3 py-1.5 font-medium text-slate-800" title={r.key}>
                            {r.key}
                          </td>
                          {invLevel === "sku" && (
                            <td className="px-3 py-1.5 text-xs text-slate-500">{r.brand}</td>
                          )}
                          <td className="px-3 py-1.5 text-right tabular-nums text-slate-600">{fmtCompact(r.cumT)}</td>
                          <td className="px-3 py-1.5 text-right tabular-nums text-slate-600">{fmtCompact(r.cumI)}</td>
                          <td className={`px-3 py-1.5 text-right font-semibold tabular-nums ${r.inv < 0 ? "text-violet-700" : "text-slate-800"}`}>
                            {fmtCompact(r.inv)}
                          </td>
                          <td className="px-3 py-1.5 text-right tabular-nums text-slate-600">{fmtCompact(r.run)}</td>
                          <td className="px-3 py-1.5 text-right tabular-nums text-slate-500">{fmtCompact(r.runP)}</td>
                          <td className="px-3 py-1.5 text-right font-bold tabular-nums text-slate-800">
                            {r.moc === null ? "—" : r.moc.toFixed(1)}
                          </td>
                          <td className="px-3 py-1.5">
                            <span className={`rounded-full px-2 py-0.5 text-[10px] font-bold ${st.cls}`}>{st.label}</span>
                          </td>
                          <td className="px-3 py-1.5 text-xs text-slate-600">
                            {r.moc === null ? "—"
                              : r.moc < 0 ? "Already depleted"
                              : r.moc > 12 ? ">12 months"
                              : `~${projectDate(r.moc)}`}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            {/* MoC heatmap */}
            <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <h2 className="text-sm font-bold text-slate-800">Months of Coverage Heatmap — Brand × Month</h2>
              <p className="mb-3 text-xs text-slate-400">
                Top {heatmap.length} brands by size · cell = cumulative implied inventory ÷ trailing 3-mo IMS at that month ·
                <span className="ml-1 rounded bg-red-100 px-1 text-red-800">&lt;1</span>
                <span className="ml-1 rounded bg-emerald-100 px-1 text-emerald-800">1–3</span>
                <span className="ml-1 rounded bg-amber-100 px-1 text-amber-800">3–6</span>
                <span className="ml-1 rounded bg-orange-200 px-1 text-orange-900">&gt;6</span>
                <span className="ml-1 rounded bg-violet-50 px-1 text-violet-700">negative</span>
                <span className="ml-1 rounded bg-slate-100 px-1 text-slate-400">n/a</span>
              </p>
              <div className="overflow-x-auto">
                <table className="w-full min-w-[640px] text-sm">
                  <thead>
                    <tr className="text-[11px] uppercase tracking-wide text-slate-500">
                      <th className="px-2 py-1 text-left">Brand</th>
                      {MONTHS.map((m) => (
                        <th key={m} className="px-2 py-1 text-center">{m}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {heatmap.map((row) => (
                      <tr key={row.brand}>
                        <td className="max-w-[160px] truncate px-2 py-1 text-xs font-semibold text-slate-700" title={row.brand}>
                          {row.brand}
                        </td>
                        {row.cells.map((c, i) => (
                          <td key={i} className="px-1 py-0.5">
                            <div className={`rounded-md px-1 py-1 text-center text-xs font-semibold tabular-nums ${mocCellColor(c)}`}>
                              {c === null ? "·" : c.toFixed(1)}
                            </div>
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </>
        )}

        {/* ================= PULL-THROUGH ANALYSIS TAB ================= */}
        {tab === "pullthrough" && (
          <>
            <div className="flex items-start gap-2 rounded-xl border border-sky-200 bg-sky-50 px-4 py-3 text-xs text-sky-800">
              <Info className="mt-0.5 h-4 w-4 shrink-0" />
              <span>
                <strong>Lagged Analysis:</strong> Each month's In-Market Sales is matched to the <em>previous</em> month's To-Market Sales — the shipments that drove it.
                Pull-Through Rate = IMS(M) ÷ TMS(M−1) × 100. Rates above 100% mean the channel is depleting stock; below 60% signals inventory accumulation.
                This view shows {lagPairs.length} complete lag pair{lagPairs.length === 1 ? "" : "s"}: {lagPairs.map((p) => p.label).join(", ")}.
              </span>
            </div>

            {/* Pull-Through KPI cards */}
            <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
              <KpiCard
                icon={Repeat} label="Avg Pull-Through Rate"
                value={ptKpi.avgPt === null ? "N/A" : ptKpi.avgPt.toFixed(0) + "%"}
                sub={`Of every 100 units shipped to distributors, ${ptKpi.avgPt !== null ? ptKpi.avgPt.toFixed(0) : "?"} reach the market next month`}
                accent={ptKpi.avgPt === null ? { bg: "bg-slate-100", text: "text-slate-500" }
                  : ptKpi.avgPt >= 85 ? { bg: "bg-emerald-50", text: "text-emerald-700", value: "text-emerald-700" }
                  : ptKpi.avgPt >= 65 ? { bg: "bg-amber-50", text: "text-amber-600", value: "text-amber-600" }
                  : { bg: "bg-red-50", text: "text-red-600", value: "text-red-600" }}
              />
              <KpiCard
                icon={TrendingDown} label="PT Trend (First→Last)"
                value={ptKpi.trend === null ? "N/A" : (ptKpi.trend >= 0 ? "+" : "") + ptKpi.trend.toFixed(0) + "pp"}
                sub={ptKpi.trend === null ? "Need ≥2 periods"
                  : ptKpi.trend >= 0 ? "Market is absorbing faster over time — healthy growth signal" : "Market absorption slowing — pipeline may be overfilled"}
                accent={ptKpi.trend === null ? { bg: "bg-slate-100", text: "text-slate-500" }
                  : ptKpi.trend >= 0 ? { bg: "bg-emerald-50", text: "text-emerald-700", value: "text-emerald-700" }
                  : { bg: "bg-red-50", text: "text-red-600", value: "text-red-600" }}
              />
              <KpiCard
                icon={Package} label="Best Period"
                value={ptKpi.bestPair ? ptKpi.bestPair.pt.toFixed(0) + "%" : "N/A"}
                sub={ptKpi.bestPair ? `${ptKpi.bestPair.label} — highest channel-to-market conversion` : ""}
                accent={{ bg: "bg-emerald-50", text: "text-emerald-700", value: "text-emerald-700" }}
              />
              <KpiCard
                icon={AlertTriangle} label="Weakest Period"
                value={ptKpi.worstPair ? ptKpi.worstPair.pt.toFixed(0) + "%" : "N/A"}
                sub={ptKpi.worstPair ? `${ptKpi.worstPair.label} — most inventory accumulated at distributor` : ""}
                accent={ptKpi.worstPair && ptKpi.worstPair.pt < 65
                  ? { bg: "bg-red-50", text: "text-red-600", value: "text-red-600" }
                  : { bg: "bg-amber-50", text: "text-amber-600", value: "text-amber-600" }}
              />
            </div>

            <Narrative title="Pull-Through Narrative" parts={lagStory} />

            {/* Pull-Through Trend Chart */}
            <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <h2 className="text-sm font-bold text-slate-800">Pull-Through Rate by Period</h2>
              <p className="mb-1 text-xs text-slate-400">
                Each bar shows: what % of last month's shipments (TMS) actually sold through to the market (IMS) this month?
              </p>
              <p className="mb-3 text-xs text-slate-400">
                <strong>How to read:</strong> "Dec→Jan" means Dec TMS drove Jan IMS. Bar at 80% = 80 out of every 100 units shipped in Dec were sold to patients/pharmacies in Jan.
                <span className="ml-1 text-emerald-600 font-semibold">Green line (85%)</span> = healthy target.
                <span className="ml-1 text-amber-500 font-semibold">Yellow line (65%)</span> = warning threshold.
                Below 65% = significant stock sitting idle at distributor.
                Above 100% = distributor selling from older stock (depleting).
              </p>
              <div style={{ width: "100%", height: 320 }}>
                <ResponsiveContainer>
                  <ComposedChart data={lagPairs.map((p) => ({
                    name: p.label,
                    pt: p.pt !== null ? Math.round(p.pt * 10) / 10 : 0,
                    tms: p.tms,
                    ims: p.ims
                  }))} margin={{ top: 20, right: 30, bottom: 5, left: 10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                    <XAxis dataKey="name" tick={{ fontSize: 11 }} />
                    <YAxis tick={{ fontSize: 11 }} domain={[0, "auto"]} unit="%" />
                    <Tooltip content={({ active, payload, label }) => {
                      if (!active || !payload?.length) return null;
                      const d = payload[0]?.payload;
                      return (
                        <div className="rounded-lg border border-slate-200 bg-white px-3 py-2 shadow-lg text-xs">
                          <p className="font-semibold text-slate-700 mb-1">{label}</p>
                          <p className="text-indigo-600 font-medium">Pull-Through: {d.pt}%</p>
                          <p className="text-slate-500">TMS(M-1): {fmtFull(d.tms)} {metricLabel}</p>
                          <p className="text-slate-500">IMS(M): {fmtFull(d.ims)} {metricLabel}</p>
                        </div>
                      );
                    }} />
                    <ReferenceLine y={85} stroke="#10b981" strokeDasharray="4 4" label={{ value: "85%", position: "left", fontSize: 10, fill: "#10b981" }} />
                    <ReferenceLine y={65} stroke="#f59e0b" strokeDasharray="4 4" label={{ value: "65%", position: "left", fontSize: 10, fill: "#f59e0b" }} />
                    <Bar dataKey="pt" fill="#6366f1" radius={[6, 6, 0, 0]} barSize={48} />
                  </ComposedChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* TMS vs IMS Growth Gap Chart */}
            {growthGap.length > 0 && (
              <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
                <h2 className="text-sm font-bold text-slate-800">TMS vs IMS Growth Gap</h2>
                <p className="mb-1 text-xs text-slate-400">
                  Are shipments and market sales growing at the same pace? This chart compares growth rates period-over-period.
                </p>
                <p className="mb-3 text-xs text-slate-400">
                  <strong>How to read:</strong> <span className="text-indigo-600 font-semibold">Purple bars</span> = TMS growth % (how much more you shipped vs. prior period).
                  <span className="text-emerald-600 font-semibold"> Green bars</span> = IMS growth % (how much more the market absorbed).
                  <span className="text-rose-500 font-semibold"> Red line</span> = gap between them.
                  Positive gap = you're shipping faster than the market sells (inventory builds up).
                  Negative gap = market demand is outrunning your shipments (healthy pull, but watch supply).
                  In a growth-phase company, the gap should narrow over time as IMS catches up to TMS.
                </p>
                <div style={{ width: "100%", height: 280 }}>
                  <ResponsiveContainer>
                    <ComposedChart data={growthGap.map((g) => ({
                      name: g.label,
                      TMS: g.tmsGrowth !== null ? Math.round(g.tmsGrowth * 10) / 10 : 0,
                      IMS: g.imsGrowth !== null ? Math.round(g.imsGrowth * 10) / 10 : 0,
                      gap: g.gap !== null ? Math.round(g.gap * 10) / 10 : 0
                    }))} margin={{ top: 20, right: 30, bottom: 5, left: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                      <XAxis dataKey="name" tick={{ fontSize: 11 }} />
                      <YAxis tick={{ fontSize: 11 }} unit="%" />
                      <Tooltip content={({ active, payload, label }) => {
                        if (!active || !payload?.length) return null;
                        const d = payload[0]?.payload;
                        return (
                          <div className="rounded-lg border border-slate-200 bg-white px-3 py-2 shadow-lg text-xs">
                            <p className="font-semibold text-slate-700 mb-1">{label}</p>
                            <p style={{ color: "#6366f1" }} className="font-medium">TMS Growth: {d.TMS}%</p>
                            <p style={{ color: "#10b981" }} className="font-medium">IMS Growth: {d.IMS}%</p>
                            <p className="text-slate-500 font-medium">Gap: {d.gap > 0 ? "+" : ""}{d.gap}pp</p>
                          </div>
                        );
                      }} />
                      <Legend wrapperStyle={{ fontSize: 11 }} />
                      <Bar dataKey="TMS" name="TMS Growth %" fill="#6366f1" radius={[4, 4, 0, 0]} barSize={28} />
                      <Bar dataKey="IMS" name="IMS Growth %" fill="#10b981" radius={[4, 4, 0, 0]} barSize={28} />
                      <Line dataKey="gap" name="Gap (pp)" type="monotone" stroke="#f43f5e" strokeWidth={2} dot={{ r: 4 }} />
                    </ComposedChart>
                  </ResponsiveContainer>
                </div>
              </div>
            )}

            {/* Brand Pull-Through Table */}
            <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <h2 className="text-sm font-bold text-slate-800">Conversion Efficiency by Brand</h2>
              <p className="mb-1 text-xs text-slate-400">
                Which brands convert shipments into market sales efficiently, and which are sitting at the distributor?
              </p>
              <p className="mb-3 text-xs text-slate-400">
                <strong>How to read:</strong> "TMS (Lagged)" = total units/value shipped in driving months. "IMS (Matched)" = what actually sold the following months.
                Pull-Through % = IMS ÷ TMS × 100.
                <span className="rounded bg-emerald-100 px-1 text-emerald-800 font-semibold">Healthy (≥85%)</span> = strong demand, channel flows well.
                <span className="ml-1 rounded bg-amber-100 px-1 text-amber-800 font-semibold">Moderate (65–85%)</span> = acceptable but monitor.
                <span className="ml-1 rounded bg-red-100 px-1 text-red-800 font-semibold">Channel Loading (&lt;50%)</span> = more than half of shipments are stuck — pause or investigate.
                <span className="ml-1 rounded bg-violet-100 px-1 text-violet-800 font-semibold">Depleting (≥100%)</span> = selling from old stock, ensure adequate supply.
              </p>
              <div className="max-h-[420px] overflow-auto rounded-lg border border-slate-100">
                <table className="w-full min-w-[700px] text-left text-sm">
                  <thead className="sticky top-0 bg-slate-50 text-[11px] uppercase tracking-wide text-slate-500">
                    <tr>
                      <th className="px-3 py-2">Brand</th>
                      <th className="px-3 py-2 text-right">TMS (Lagged)</th>
                      <th className="px-3 py-2 text-right">IMS (Matched)</th>
                      <th className="px-3 py-2 text-right">Pull-Through %</th>
                      <th className="px-3 py-2 text-right">Lag Periods</th>
                      <th className="px-3 py-2">Assessment</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {brandPT.map((r) => {
                      const cls = r.pt >= 100 ? "bg-violet-100 text-violet-800"
                        : r.pt >= 85 ? "bg-emerald-100 text-emerald-800"
                        : r.pt >= 65 ? "bg-amber-100 text-amber-800"
                        : r.pt >= 50 ? "bg-orange-100 text-orange-800"
                        : "bg-red-100 text-red-800";
                      const lbl = r.pt >= 100 ? "Depleting"
                        : r.pt >= 85 ? "Healthy"
                        : r.pt >= 65 ? "Moderate"
                        : r.pt >= 50 ? "Weak"
                        : "Channel Loading";
                      return (
                        <tr key={r.brand} className="hover:bg-slate-50">
                          <td className="max-w-[200px] truncate px-3 py-1.5 font-medium text-slate-800" title={r.brand}>{r.brand}</td>
                          <td className="px-3 py-1.5 text-right tabular-nums text-slate-600">{fmtCompact(r.tms)}</td>
                          <td className="px-3 py-1.5 text-right tabular-nums text-slate-600">{fmtCompact(r.ims)}</td>
                          <td className="px-3 py-1.5 text-right font-bold tabular-nums text-slate-800">{r.pt.toFixed(0)}%</td>
                          <td className="px-3 py-1.5 text-right tabular-nums text-slate-500">{r.pairs}</td>
                          <td className="px-3 py-1.5">
                            <span className={`rounded-full px-2 py-0.5 text-[10px] font-bold ${cls}`}>{lbl}</span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Pull-Through Heatmap: Brand × Lag Period */}
            {ptHeatmap.length > 0 && (
              <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
                <h2 className="text-sm font-bold text-slate-800">Pull-Through Heatmap — Brand × Lag Period</h2>
                <p className="mb-1 text-xs text-slate-400">
                  A bird's-eye view of how each brand converts shipments to sales across every period. Spot patterns: is a brand consistently weak, or did it dip in one period?
                </p>
                <p className="mb-3 text-xs text-slate-400">
                  <strong>How to read:</strong> Each cell = pull-through % for that brand in that period. "Avg" = brand's overall conversion rate.
                  <span className="ml-1 rounded bg-red-100 px-1 text-red-800">&lt;50% heavy loading</span>
                  <span className="ml-1 rounded bg-orange-100 px-1 text-orange-800">50–65% weak</span>
                  <span className="ml-1 rounded bg-amber-100 px-1 text-amber-800">65–85% moderate</span>
                  <span className="ml-1 rounded bg-emerald-100 px-1 text-emerald-800">85–100% healthy</span>
                  <span className="ml-1 rounded bg-violet-100 px-1 text-violet-800">&gt;100% depleting old stock</span>
                  · Look for rows turning greener over time (improving) or redder (deteriorating).
                </p>
                <div className="overflow-x-auto">
                  <table className="w-full min-w-[640px] text-sm">
                    <thead>
                      <tr className="text-[11px] uppercase tracking-wide text-slate-500">
                        <th className="px-2 py-1 text-left">Brand</th>
                        {lagPairs.map((p) => (
                          <th key={p.label} className="px-2 py-1 text-center">{p.label}</th>
                        ))}
                        <th className="px-2 py-1 text-center">Avg</th>
                      </tr>
                    </thead>
                    <tbody>
                      {ptHeatmap.map((row) => (
                        <tr key={row.brand}>
                          <td className="max-w-[160px] truncate px-2 py-1 text-xs font-semibold text-slate-700" title={row.brand}>{row.brand}</td>
                          {row.cells.map((c, i) => {
                            const cls = c === null ? "bg-slate-100 text-slate-400"
                              : c >= 100 ? "bg-violet-100 text-violet-800"
                              : c >= 85 ? "bg-emerald-100 text-emerald-800"
                              : c >= 65 ? "bg-amber-100 text-amber-800"
                              : c >= 50 ? "bg-orange-200 text-orange-900"
                              : "bg-red-200 text-red-900";
                            return (
                              <td key={i} className="px-1 py-0.5">
                                <div className={`rounded-md px-1 py-1 text-center text-xs font-semibold tabular-nums ${cls}`}>
                                  {c === null ? "·" : c.toFixed(0) + "%"}
                                </div>
                              </td>
                            );
                          })}
                          <td className="px-1 py-0.5">
                            <div className={`rounded-md px-1 py-1 text-center text-xs font-bold tabular-nums ${
                              row.avgPt >= 85 ? "bg-emerald-200 text-emerald-900" : row.avgPt >= 65 ? "bg-amber-200 text-amber-900" : "bg-red-200 text-red-900"
                            }`}>
                              {row.avgPt.toFixed(0)}%
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </>
        )}

        <p className="pb-2 text-center text-[11px] text-slate-400">
          Source: TMS VS IMS.xlsx · Raw Data ({ROWS.length} records) · {metricLabel} view · Implied inventory assumes zero opening stock
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TmsImsDashboard />);

</script>
</body>
</html>
